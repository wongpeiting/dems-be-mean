name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Promote the Dems Be Mean piece to the site ROOT for deploy only, so it serves
      # cleanly at wongpeiting.github.io/dems-be-mean/ (the repo source keeps the
      # /dems-be-mean route untouched, so local dev is unaffected).
      - name: Promote piece to site root
        run: |
          rm -f src/routes/+page.svelte
          for f in src/routes/dems-be-mean/*.svelte; do mv "$f" src/routes/; done
          rmdir src/routes/dems-be-mean || true

      - name: Build
        env:
          BASE_PATH: /dems-be-mean
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
